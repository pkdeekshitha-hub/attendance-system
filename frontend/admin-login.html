<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 30px; }
    .login-logo i { font-size: 3rem; color: #e74c3c; }
    .login-logo h4 { color: #2c3e50; font-weight: 700; margin-top: 10px; }
    .form-control {
      border-radius: 8px;
      padding: 12px 15px;
      border: 1px solid #ddd;
    }
    .form-control:focus {
      border-color: #e74c3c;
      box-shadow: 0 0 0 3px rgba(231,76,60,0.15);
    }
    .input-group-text {
      background: #f8f9fa;
      border-radius: 8px 0 0 8px;
      color: #e74c3c;
    }
    .btn-admin {
      background: linear-gradient(135deg, #1a1a2e, #e74c3c);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      width: 100%;
    }
    .btn-admin:hover { opacity: 0.9; color: white; }
    .alert { border-radius: 8px; }
    .admin-badge {
      background: #fff3f3;
      border: 1px solid #e74c3c;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      color: #e74c3c;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-shield-alt"></i>
      <h4>Admin Portal</h4>
      <p class="text-muted">Restricted Access</p>
    </div>

    <div class="admin-badge">
      <i class="fas fa-lock me-2"></i>Admin credentials required
    </div>

    <div id="alertMsg"></div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Admin Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
        <input type="email" id="email" class="form-control" placeholder="Enter admin email">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" id="password" class="form-control" placeholder="Enter admin password">
      </div>
    </div>

    <button class="btn-admin" onclick="adminLogin()">
      <i class="fas fa-shield-alt me-2"></i>Admin Login
    </button>

    <div class="text-center mt-3">
      <a href="login.html" class="text-muted text-decoration-none">
        <i class="fas fa-arrow-left me-1"></i>Student Login
      </a>
    </div>
  </div>

  <script>
    const BASE_URL = 'http://localhost:5000';

    async function adminLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields!', 'danger');
        return;
      }

      try {
        const res = await fetch(BASE_URL + '/api/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_name', data.name);
          localStorage.setItem('admin_id', data.admin_id);
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'admin.html', 1000);
        } else {
          showAlert(data.error, 'danger');
        }
      } catch (err) {
        showAlert('Cannot connect to server. Make sure backend is running!', 'danger');
      }
    }

    function showAlert(msg, type) {
      document.getElementById('alertMsg').innerHTML =
        '<div class="alert alert-' + type + '">' + msg + '</div>';
    }

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') adminLogin();
    });
  </script>

</body>
</html>
