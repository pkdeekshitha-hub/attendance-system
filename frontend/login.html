<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo i {
      font-size: 3rem;
      color: #3498db;
    }
    .login-logo h4 {
      color: #2c3e50;
      font-weight: 700;
      margin-top: 10px;
    }
    .form-control {
      border-radius: 8px;
      padding: 12px 15px;
      border: 1px solid #ddd;
    }
    .form-control:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
    }
    .input-group-text {
      background: #f8f9fa;
      border-radius: 8px 0 0 8px;
      color: #3498db;
    }
    .btn-login {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      width: 100%;
    }
    .btn-login:hover { opacity: 0.9; color: white; }
    .divider { text-align: center; color: #aaa; margin: 20px 0; }
    .alert { border-radius: 8px; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-calendar-check"></i>
      <h4>Attendance System</h4>
      <p class="text-muted">Student Login</p>
    </div>

    <div id="alertMsg"></div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Email Address</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
        <input type="email" id="email" class="form-control" placeholder="Enter your email">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" id="password" class="form-control" placeholder="Enter your password">
      </div>
    </div>

    <button class="btn-login" onclick="login()">
      <i class="fas fa-sign-in-alt me-2"></i>Login
    </button>

    <div class="divider">or</div>

    <div class="text-center">
      <p class="text-muted">Don't have an account? <a href="signup.html" class="text-decoration-none fw-semibold">Sign Up</a></p>
      <p class="text-muted">Are you an admin? <a href="admin-login.html" class="text-decoration-none fw-semibold">Admin Login</a></p>
      <a href="index.html" class="text-muted text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
    </div>
  </div>

  <script>
    const BASE_URL = 'https://attendance-system-vty2.onrender.com';

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields!', 'danger');
        return;
      }

      try {
        const res = await fetch(BASE_URL + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('student_id', data.student_id);
          localStorage.setItem('name', data.name);
          localStorage.setItem('email', data.email);
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        } else {
          showAlert(data.error, 'danger');
        }
      } catch (err) {
        showAlert('Cannot connect to server. Make sure backend is running!', 'danger');
      }
    }

    function showAlert(msg, type) {
      document.getElementById('alertMsg').innerHTML =
        '<div class="alert alert-' + type + '">' + msg + '</div>';
    }

    // Press Enter to login
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>

</body>
</html>
